<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Birthday Unlock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100%;
      width: 100%;
      -webkit-text-size-adjust: 100%;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #video { display: none; }
    #canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #status {
      position: absolute;
      top: 20px;
      left: 16px;
      right: 16px;
      padding: 14px 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 18px;
      font-size: 18px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
      transition: background 0.3s;
    }
    .success { background: rgba(34, 197, 94, 0.85) !important; }
    .loading { background: rgba(59, 130, 246, 0.7) !important; }
    .error { background: rgba(239, 68, 68, 0.85) !important; }

    #progress {
      position: absolute;
      bottom: 30px;
      left: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    #progress .step {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      transition: background 0.3s;
    }
    #progress .step.done { background: #22c55e; }
    #progress .step.current { background: #3b82f6; }

    #startScreen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: linear-gradient(180deg, #1a0033 0%, #000 100%);
      z-index: 20;
    }
    #startScreen h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    #startScreen p {
      font-size: 16px;
      opacity: 0.7;
      margin-bottom: 32px;
      line-height: 1.5;
      max-width: 320px;
    }
    #startBtn {
      padding: 18px 48px;
      font-size: 20px;
      font-weight: 600;
      color: #000;
      background: #fff;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s;
    }
    #startBtn:active { transform: scale(0.96); }
    #startBtn:disabled { opacity: 0.5; cursor: wait; }

    #taskTitle {
      position: absolute;
      top: 80px;
      left: 16px;
      right: 16px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      z-index: 10;
    }

    #checklist {
      position: absolute;
      bottom: 50px;
      left: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.55);
      padding: 16px;
      border-radius: 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    #checklist .item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 17px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    #checklist .item.active {
      opacity: 1;
      color: #4ade80;
    }
    #checklist .item .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }
    #checklist .item.active .dot {
      background: #22c55e;
      border-color: #22c55e;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="status" class="loading" style="display:none">Загрузка...</div>
    <div id="taskTitle" style="display:none"></div>
    <div id="checklist" style="display:none"></div>
    <div id="progress" style="display:none"></div>

    <div id="startScreen">
      <h1>Подарок заблокирован</h1>
      <p>Чтобы открыть поздравление, пройди 4 проверки. Нужна камера. Видео не сохраняется.</p>
      <button id="startBtn">Начать</button>
    </div>
  </div>

  <script type="module">
    import {
      FaceLandmarker,
      HandLandmarker,
      FilesetResolver
    } from "./assets/vision_bundle.mjs";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const startScreen = document.getElementById('startScreen');
    const startBtn = document.getElementById('startBtn');
    const taskTitle = document.getElementById('taskTitle');
    const progress = document.getElementById('progress');

    let faceLandmarker;
    let handLandmarker;
    let lastVideoTime = -1;
    let allHoldFrames = 0;
    const REQUIRED_HOLD = 15;

    let handYHistory = [];

    const tasks = [
      { name: "Закрой глаза", active: false },
      { name: "Открой рот", active: false },
      { name: "Посыпь соль в рот", active: false }
    ];

    const checklist = document.getElementById('checklist');

    function renderChecklist() {
      checklist.innerHTML = '';
      checklist.style.display = 'flex';
      tasks.forEach(t => {
        const item = document.createElement('div');
        item.className = 'item' + (t.active ? ' active' : '');
        item.innerHTML = `<div class="dot">${t.active ? '✓' : ''}</div><span>${t.name}</span>`;
        checklist.appendChild(item);
      });
    }

    function checkEyes(face) {
      if (!face) return false;
      const bs = face.faceBlendshapes[0].categories;
      const blinkL = bs.find(b => b.categoryName === 'eyeBlinkLeft');
      const blinkR = bs.find(b => b.categoryName === 'eyeBlinkRight');
      return (blinkL.score + blinkR.score) / 2 > 0.5;
    }

    function checkMouth(face) {
      if (!face) return false;
      const bs = face.faceBlendshapes[0].categories;
      const jaw = bs.find(b => b.categoryName === 'jawOpen');
      return jaw.score > 0.4;
    }

    function checkSprinkle(hands) {
      if (!hands || hands.length === 0) {
        handYHistory = [];
        return false;
      }
      const wrist = hands[0][0];
      handYHistory.push(wrist.y);
      if (handYHistory.length > 15) handYHistory.shift();
      if (handYHistory.length < 4) return false;

      let prevY = handYHistory[0];
      let moves = 0;

      for (let i = 1; i < handYHistory.length; i++) {
        const dy = Math.abs(handYHistory[i] - prevY);
        if (dy > 0.004) moves++;
        prevY = handYHistory[i];
      }

      return moves >= 2;
    }

    function setStatus(text, type = '') {
      status.textContent = text;
      status.className = type;
      status.style.display = 'block';
    }

    function renderProgress() {}

    async function start() {
      startBtn.disabled = true;
      startBtn.textContent = 'Загрузка...';
      try {
        setStatus('Загрузка моделей...', 'loading');

        const filesetResolver = await FilesetResolver.forVisionTasks("./assets/wasm");

        faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
          baseOptions: {
            modelAssetPath: "./assets/models/face_landmarker.task",
            delegate: "GPU"
          },
          outputFaceBlendshapes: true,
          runningMode: "VIDEO",
          numFaces: 1
        });

        handLandmarker = await HandLandmarker.createFromOptions(filesetResolver, {
          baseOptions: {
            modelAssetPath: "./assets/models/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 1
        });

        setStatus('Включаю камеру...', 'loading');

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 960 } },
          audio: false
        });

        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        await video.play();

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        startScreen.style.display = 'none';
        taskTitle.textContent = 'Сделай всё одновременно';
        taskTitle.style.display = 'block';
        renderChecklist();
        predict();

      } catch (err) {
        startBtn.disabled = false;
        startBtn.textContent = 'Начать';
        setStatus('Ошибка: ' + err.message, 'error');
        console.error(err);
      }
    }

    function resizeCanvas() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const ratio = vw / vh;
      let cw, ch;
      if (w / h > ratio) {
        cw = h * ratio;
        ch = h;
      } else {
        cw = w;
        ch = w / ratio;
      }
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.style.width = cw + 'px';
      canvas.style.height = ch + 'px';
    }

    function predict() {
      const now = performance.now();

      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;

        const faceResults = faceLandmarker.detectForVideo(video, now);
        const handResults = handLandmarker.detectForVideo(video, now);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        const faceData = faceResults.faceLandmarks.length > 0 ? {
          landmarks: faceResults.faceLandmarks[0],
          faceBlendshapes: faceResults.faceBlendshapes
        } : null;
        const hands = handResults.landmarks || [];

        tasks[0].active = checkEyes(faceData);
        tasks[1].active = checkMouth(faceData);
        tasks[2].active = checkSprinkle(hands);

        renderChecklist();

        const allActive = tasks.every(t => t.active);
        if (allActive) {
          allHoldFrames++;
          if (allHoldFrames >= REQUIRED_HOLD) {
            taskTitle.textContent = 'Готово!';
            setStatus('Проверка пройдена! Доступ открыт ✨', 'success');
            return;
          } else {
            setStatus('Держи! ' + allHoldFrames + '/' + REQUIRED_HOLD, 'loading');
          }
        } else {
          allHoldFrames = 0;
          const done = tasks.filter(t => t.active).length;
          setStatus('Выполнено: ' + done + ' из 3', 'loading');
        }
      }

      requestAnimationFrame(predict);
    }

    startBtn.addEventListener('click', start);
  </script>
</body>
</html>
